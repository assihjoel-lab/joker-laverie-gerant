<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <meta name="theme-color" content="#1A3EBD"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="JOKER Laverie"/>
    <meta name="description" content="JOKER Laverie & Service — Lomé, Togo"/>
    <meta name="mobile-web-app-capable" content="yes"/>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json"/>

    <!-- Apple icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>

    <title>JOKER Laverie</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box;}
      body{background:#060D1F;font-family:sans-serif;}
      #root{max-width:420px;margin:0 auto;min-height:100vh;}
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Enregistrement du Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) { console.log('SW OK', reg.scope); })
            .catch(function(err) { console.log('SW error', err); });
        });
      }
    </script>
  </body>
</html>
